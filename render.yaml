services:
  - type: web
    name: truthlens
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: models
      mountPath: /opt/render/project/src/models
      sizeGB: 5
